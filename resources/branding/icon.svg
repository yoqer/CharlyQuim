<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="brainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circuitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="#000000"/>
  
  <!-- Brain outline -->
  <path d="M512 100 C 300 100, 150 250, 150 400 C 150 500, 200 600, 300 650 C 350 700, 400 750, 500 780 C 600 800, 700 780, 800 750 C 850 700, 900 600, 900 500 C 900 400, 850 300, 800 250 C 750 200, 700 150, 600 120 C 580 110, 560 105, 540 100 C 530 100, 520 100, 512 100 Z" 
        fill="none" 
        stroke="url(#brainGradient)" 
        stroke-width="8" 
        filter="url(#glow)"/>
  
  <!-- Circuit nodes -->
  <circle cx="400" cy="350" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="624" cy="350" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="512" cy="450" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="350" cy="500" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="674" cy="500" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="450" cy="600" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  <circle cx="574" cy="600" r="12" fill="url(#circuitGradient)" filter="url(#glow)"/>
  
  <!-- Circuit connections forming X -->
  <line x1="400" y1="350" x2="624" y2="500" stroke="url(#circuitGradient)" stroke-width="4" filter="url(#glow)"/>
  <line x1="624" y1="350" x2="400" y2="500" stroke="url(#circuitGradient)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Additional circuit connections -->
  <line x1="400" y1="350" x2="350" y2="500" stroke="url(#circuitGradient)" stroke-width="3" filter="url(#glow)"/>
  <line x1="624" y1="350" x2="674" y2="500" stroke="url(#circuitGradient)" stroke-width="3" filter="url(#glow)"/>
  <line x1="512" y1="450" x2="450" y2="600" stroke="url(#circuitGradient)" stroke-width="3" filter="url(#glow)"/>
  <line x1="512" y1="450" x2="574" y2="600" stroke="url(#circuitGradient)" stroke-width="3" filter="url(#glow)"/>
  <line x1="350" y1="500" x2="450" y2="600" stroke="url(#circuitGradient)" stroke-width="2" filter="url(#glow)"/>
  <line x1="674" y1="500" x2="574" y2="600" stroke="url(#circuitGradient)" stroke-width="2" filter="url(#glow)"/>
</svg>
